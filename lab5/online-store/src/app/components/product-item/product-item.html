<div class="product-card">
  <div class="product-image">
    <img [src]="product.imageUrl" [alt]="product.name">
    <div class="product-badge" *ngIf="product.brand">{{ product.brand }}</div>
  </div>
  
  <div class="product-info">
    <h3 class="product-name">{{ product.name }}</h3>
    <p class="product-description">{{ product.description }}</p>
    
    <div class="product-rating">
      <span class="stars">
        @for (star of getStars(product.rating); track $index) {
          <span class="star">★</span>
        }
        @for (star of getStars(5 - product.rating); track $index) {
          <span class="star empty">☆</span>
        }
      </span>
      <span class="reviews">({{ product.reviews }} отзывов)</span>
    </div>
    
    <div class="product-price">
      <span class="current-price">{{ product.price | number }} ₸</span>
    </div>
    
    <div class="product-likes">
      <button class="like-btn" (click)="onLike()">
        <span class="heart">❤</span>
        <span class="likes-count">{{ product.likes }}</span>
      </button>
    </div>
    
    <div class="product-actions">
      <a [href]="product.kaspiLink" target="_blank" class="buy-btn">Купить на Kaspi</a>
      <button class="share-btn" (click)="shareOnWhatsApp()">WhatsApp</button>
      <button class="share-btn telegram" (click)="shareOnTelegram()">Telegram</button>
      <button class="delete-btn" (click)="onDelete()">🗑️ Удалить</button>
    </div>
  </div>
</div>
