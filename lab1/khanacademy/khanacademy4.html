<!DOCTYPE HTML>
<html>
    <head>
        <title>Challenge: A picture-perfect trip</title>
        <meta charset="utf-8">
    </head>
    <body>
        <h1>The perfect trip</h1>
        
        <p>I would see scenes like...</p>
        <img 
            src="https://cdn.kastatic.org/third_party/javascript-khansrc/live-editor/build/images/landscapes/thumbs/beach-at-dusk.png" 
            alt="A peaceful beach at dusk with the sun setting over the ocean"
            width="500" 
            height="300">
        
        <p>And animals like...</p>
        <img 
            src="https://cdn.kastatic.org/third_party/javascript-khansrc/live-editor/build/images/animals/cat.png" 
            alt="A cute orange cat sitting and looking at the camera"
            width="300" 
            height="300">
        
        <p>And eat food like...</p>
        <img 
            src="https://cdn.kastastic.org/third_party/javascript-khansrc/live-editor/build/images/food/berries.png" 
            alt="A bowl of fresh mixed berries including strawberries and blueberries"
            width="400" 
            height="300">
        
    </body>
</html>
