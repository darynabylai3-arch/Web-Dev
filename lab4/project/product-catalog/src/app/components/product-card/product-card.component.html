<div class="product-card" (click)="onClick()">
  <div class="product-image">
    <img [src]="product.imageUrl" [alt]="product.name">
    <div class="product-badge" *ngIf="product.badge">{{ product.badge }}</div>
  </div>
  
  <div class="product-info">
    <h3 class="product-name">
      {{ product.name }} <span class="product-brand" *ngIf="product.brand">{{ product.brand }}</span>
    </h3>
    
    <div class="product-rating">
      <span class="stars">
        <span *ngFor="let star of getStars(product.rating)" class="star">★</span>
        <span *ngFor="let star of getStars(5 - product.rating)" class="star empty">☆</span>
      </span>
      <span class="reviews">({{ product.reviews }} отзывов)</span>
    </div>
    
    <div class="product-price">
      <div class="current-price">{{ product.price }} ₸</div>
      <div class="installment" *ngIf="product.monthlyPrice">
        В рассрочку: {{ product.monthlyPrice }} ₸ x3
      </div>
    </div>
    
    <div class="product-features" *ngIf="product.features">
      <span *ngFor="let feature of product.features" class="feature-tag">{{ feature }}</span>
    </div>
    
    <div class="product-code" *ngIf="product.code">
      Код товара: {{ product.code }}
    </div>
  </div>
</div>
