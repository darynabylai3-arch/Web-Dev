<div class="container">
  <header>
    <h1>Каталог товаров</h1>
    <nav>
      <button>ТВ, Аудио, Видео</button>
      <button>Фото- и видеокамеры</button>
      <button>Штативы</button>
    </nav>
  </header>
  
  <div class="product-grid">
    <app-product-card 
      *ngFor="let product of products" 
      [product]="product"
      (productClick)="onProductClick($event)"
    ></app-product-card>
  </div>
  
  <app-product-detail 
    *ngIf="selectedProductId"
    [id]="selectedProductId"
    (close)="closeDetail()"
  ></app-product-detail>
</div>
